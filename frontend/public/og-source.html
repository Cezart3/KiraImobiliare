<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      body {
        font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
        background: linear-gradient(135deg, #064e3b 0%, #0f172a 60%, #064e3b 100%);
        color: #f8fafc;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 80px;
      }
      .brand { display: flex; align-items: center; gap: 20px; margin-bottom: 48px; }
      .logo {
        width: 84px; height: 84px; border-radius: 20px;
        background: #059669; display: flex; align-items: center; justify-content: center;
      }
      .logo svg { width: 46px; height: 46px; stroke: #fff; }
      .name { font-size: 56px; font-weight: 800; letter-spacing: -1px; }
      h1 { font-size: 72px; font-weight: 800; line-height: 1.05; letter-spacing: -2px; max-width: 1000px; }
      .accent { color: #34d399; }
      .features { display: flex; gap: 16px; margin-top: 56px; flex-wrap: wrap; }
      .chip {
        background: rgba(255,255,255,0.08); border: 1px solid rgba(52,211,153,0.3);
        color: #d1fae5; padding: 14px 24px; border-radius: 999px;
        font-size: 26px; font-weight: 600;
      }
      .url { margin-top: 48px; font-size: 30px; color: #6ee7b7; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </div>
      <div class="name">Kira</div>
    </div>
    <h1>Toate chiriile din orașul tău, <span class="accent">într-un singur loc.</span></h1>
    <div class="features">
      <div class="chip">Centrală proprie vs termoficare</div>
      <div class="chip">Parcare</div>
      <div class="chip">Distanța până la tine</div>
    </div>
    <div class="url">kiraimobiliare.ro</div>
  </body>
</html>
