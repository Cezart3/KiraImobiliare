<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kira — toate chiriile din orașul tău</title>
    <meta name="description" content="Kira adună chiriile din toată România într-un singur loc. Filtre pe centrală proprie, parcare și distanță — link direct la anunțul original." />

    <!-- Social share preview (LinkedIn / Facebook / WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kira" />
    <meta property="og:title" content="Kira — toate chiriile din orașul tău" />
    <meta property="og:description" content="Toate chiriile din orașul tău, într-un singur loc. Filtre pe centrală proprie, parcare și distanță — cu link direct la anunțul original." />
    <meta property="og:url" content="https://kiraimobiliare.ro/" />
    <meta property="og:image" content="https://kiraimobiliare.ro/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ro_RO" />
    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kira — toate chiriile din orașul tău" />
    <meta name="twitter:description" content="Toate chiriile din orașul tău, într-un singur loc." />
    <meta name="twitter:image" content="https://kiraimobiliare.ro/og-image.png" />
    <meta name="theme-color" content="#059669" />
    <script>
      // Apply the stored/preferred theme before first paint to avoid a
      // light->dark flash. Kept in sync with ThemeToggle.tsx.
      (function () {
        var stored = localStorage.getItem('theme')
        var dark = stored === 'dark' || (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.classList.toggle('dark', dark)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
