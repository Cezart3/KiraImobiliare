<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RentForYou — chirii din toată țara</title>
    <meta name="description" content="Toate chiriile din orașul tău, într-un singur loc. Filtre pe centrală proprie, parcare și încălzire — link direct la anunțul original." />
    <script>
      // Apply the stored/preferred theme before first paint to avoid a
      // light->dark flash. Kept in sync with ThemeToggle.tsx.
      (function () {
        var stored = localStorage.getItem('theme')
        var dark = stored === 'dark' || (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.classList.toggle('dark', dark)
      })()
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
